spring.application.name=appointment-service
server.port=4003

# Eureka client config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# DataSource Configuration (Neon PostgreSQL)
spring.datasource.url=jdbc:postgresql://ep-aged-rain-a4gyliso-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_placeholder
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mail.medlink@gmail.com
spring.mail.password=placeholder
