spring.application.name=api-gateway
server.port=4000

# Eureka client config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# CORS configuration
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].maxAge=3600

# Route to Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/login,/register,/verify-account

# Route to Hospital Service
spring.cloud.gateway.routes[1].id=hospital-service
spring.cloud.gateway.routes[1].uri=lb://hospital-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/hospitals/**

# Route to Appointment Service
spring.cloud.gateway.routes[2].id=appointment-service
spring.cloud.gateway.routes[2].uri=lb://appointment-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/appointment/**,/contact
